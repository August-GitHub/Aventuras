name: Pre-release

on:
  push:
    tags:
      - 'v*-pre*'   # Only match pre-release tags (e.g., v0.7.0-pre.1, v1.0.0-pre.2)
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # 版本一致性检查 - 确保所有版本源同步
  check-version:
    name: Check Version Consistency
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract version from package.json
        id: pkg-version
        run: echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Extract version from Cargo.toml
        id: cargo-version
        run: echo "VERSION=$(grep '^version' src-tauri/Cargo.toml | sed 's/version = \"\(.*\)\"/\1/')" >> $GITHUB_OUTPUT

      - name: Extract version from tag
        id: tag-version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Validate versions consistency
        run: |
          PKG_VERSION="${{ steps.pkg-version.outputs.VERSION }}"
          CARGO_VERSION="${{ steps.cargo-version.outputs.VERSION }}"
          TAG_VERSION="${{ steps.tag-version.outputs.VERSION }}"
          
          echo "📦 package.json 版本: $PKG_VERSION"
          echo "📋 Cargo.toml 版本: $CARGO_VERSION"
          echo "🏷️  Git 标签版本: v$TAG_VERSION"
          
          if [ "$PKG_VERSION" != "$CARGO_VERSION" ]; then
            echo "❌ 错误：package.json 和 Cargo.toml 版本不一致！"
            echo "   package.json: $PKG_VERSION"
            echo "   Cargo.toml:  $CARGO_VERSION"
            exit 1
          fi
          
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ 错误：Git 标签版本与文件版本不一致！"
            echo "   Git 标签:    v$TAG_VERSION"
            echo "   文件版本:    $PKG_VERSION"
            exit 1
          fi
          
          echo "✅ 所有版本号一致！"

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [check-version]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          cache-key: android-rust-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - name: Gradle cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            src-tauri/gen/android/app/.cxx
            src-tauri/gen/android/app/build
          key: ${{ runner.os }}-gradle-${{ hashFiles('src-tauri/gen/android/app/**/*.gradle*', 'src-tauri/gen/android/app/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: npx tauri android build

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > aventura-release.keystore

      - name: Sign APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks aventura-release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --out aventura-release.apk \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: aventura-release.apk

      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          prerelease: true
          files: aventura-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}